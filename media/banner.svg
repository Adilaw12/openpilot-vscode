<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14141f"/>
      <stop offset="100%" stop-color="#1c1c2e"/>
    </linearGradient>
    <radialGradient id="glow" cx="15%" cy="10%" r="60%">
      <stop offset="0%" stop-color="#8b7bff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#8b7bff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b7bff"/>
      <stop offset="100%" stop-color="#5ad1e6"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="320" rx="16" fill="url(#bg)"/>
  <rect width="1200" height="320" rx="16" fill="url(#glow)"/>

  <!-- Branding -->
  <text x="56" y="120" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="54" font-weight="800" fill="url(#logoGrad)">Freebird AI</text>
  <text x="58" y="160" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" fill="#9999ad">The affordable, open-source</text>
  <text x="58" y="188" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" fill="#9999ad">alternative to Copilot</text>

  <!-- backend pills -->
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="600">
    <rect x="58" y="222" width="92" height="32" rx="16" fill="rgba(139,123,255,0.12)" stroke="#8b7bff" stroke-opacity="0.35"/>
    <text x="104" y="243" fill="#a89aff" text-anchor="middle">Ollama</text>

    <rect x="160" y="222" width="92" height="32" rx="16" fill="rgba(139,123,255,0.12)" stroke="#8b7bff" stroke-opacity="0.35"/>
    <text x="206" y="243" fill="#a89aff" text-anchor="middle">Claude</text>

    <rect x="262" y="222" width="92" height="32" rx="16" fill="rgba(139,123,255,0.12)" stroke="#8b7bff" stroke-opacity="0.35"/>
    <text x="308" y="243" fill="#a89aff" text-anchor="middle">OpenAI</text>
  </g>

  <!-- Editor mockup -->
  <g>
    <rect x="620" y="40" width="540" height="240" rx="10" fill="#0f0f17" stroke="rgba(255,255,255,0.08)"/>
    <rect x="620" y="40" width="540" height="34" rx="10" fill="#181826"/>
    <circle cx="644" cy="57" r="6" fill="#ff5f56"/>
    <circle cx="664" cy="57" r="6" fill="#ffbd2e"/>
    <circle cx="684" cy="57" r="6" fill="#27c93f"/>
    <text x="940" y="61" font-family="Consolas, monospace" font-size="13" fill="#6e6e85" text-anchor="end">parser.ts</text>

    <!-- code lines -->
    <g>
      <rect x="644" y="92" width="60" height="10" rx="3" fill="#8b7bff"/>
      <rect x="712" y="92" width="90" height="10" rx="3" fill="#e6e6f0" opacity="0.6"/>

      <rect x="664" y="120" width="40" height="10" rx="3" fill="#8b7bff"/>
      <rect x="712" y="120" width="120" height="10" rx="3" fill="#5ad1e6" opacity="0.7"/>

      <!-- highlighted edit line -->
      <rect x="644" y="150" width="380" height="28" rx="6" fill="rgba(139,123,255,0.15)" stroke="#8b7bff" stroke-width="1.5"/>
      <rect x="664" y="158" width="50" height="10" rx="3" fill="#8b7bff"/>
      <rect x="722" y="158" width="160" height="10" rx="3" fill="#4ade80" opacity="0.8"/>

      <rect x="664" y="196" width="100" height="10" rx="3" fill="#e6e6f0" opacity="0.5"/>
      <rect x="664" y="224" width="70" height="10" rx="3" fill="#8b7bff"/>
      <rect x="744" y="224" width="140" height="10" rx="3" fill="#e6e6f0" opacity="0.5"/>
    </g>

    <!-- annotation -->
    <g font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="600">
      <rect x="700" y="246" width="220" height="34" rx="17" fill="#1a1a26" stroke="#8b7bff"/>
      <text x="810" y="268" fill="#a89aff" text-anchor="middle">Ctrl+Alt+K — Inline Edit</text>
    </g>
    <line x1="824" y1="178" x2="810" y2="246" stroke="#8b7bff" stroke-width="1.5" stroke-dasharray="4 4"/>
  </g>
</svg>
