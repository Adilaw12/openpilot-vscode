<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 580" width="1200" height="580">
  <defs>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b7bff"/>
      <stop offset="100%" stop-color="#5ad1e6"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="580" rx="16" fill="#0f0f17"/>

  <!-- Card 1: Codebase-Aware Agent -->
  <g>
    <rect x="40" y="32" width="540" height="230" rx="14" fill="#1a1a26" stroke="rgba(255,255,255,0.08)"/>
    <circle cx="90" cy="82" r="28" fill="rgba(139,123,255,0.12)" stroke="#8b7bff" stroke-opacity="0.35"/>
    <g fill="none" stroke="url(#iconGrad)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" transform="translate(62,54) scale(1.5)">
      <circle cx="10" cy="10" r="6"/>
      <line x1="14.5" y1="14.5" x2="20" y2="20"/>
    </g>
    <text x="142" y="90" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#e6e6f0">Codebase-Aware Agent</text>
    <text x="64" y="142" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" fill="#9999ad">Reads your whole project, searches across files,</text>
    <text x="64" y="166" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" fill="#9999ad">and makes multi-file edits — with your approval.</text>
  </g>

  <!-- Card 2: Live HTML Preview -->
  <g>
    <rect x="620" y="32" width="540" height="230" rx="14" fill="#1a1a26" stroke="rgba(255,255,255,0.08)"/>
    <circle cx="670" cy="82" r="28" fill="rgba(139,123,255,0.12)" stroke="#8b7bff" stroke-opacity="0.35"/>
    <g fill="none" stroke="url(#iconGrad)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" transform="translate(642,54) scale(1.5)">
      <rect x="2" y="4" width="20" height="14" rx="2"/>
      <line x1="2" y1="9" x2="22" y2="9"/>
      <circle cx="12" cy="14" r="2.3"/>
    </g>
    <text x="722" y="90" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#e6e6f0">Live HTML Preview</text>
    <text x="644" y="142" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" fill="#9999ad">Preview any page you build right inside VS Code</text>
    <text x="644" y="166" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" fill="#9999ad">— no Live Server extension required.</text>
  </g>

  <!-- Card 3: Bring Your Own AI -->
  <g>
    <rect x="40" y="294" width="540" height="230" rx="14" fill="#1a1a26" stroke="rgba(255,255,255,0.08)"/>
    <circle cx="90" cy="344" r="28" fill="rgba(139,123,255,0.12)" stroke="#8b7bff" stroke-opacity="0.35"/>
    <g fill="none" stroke="url(#iconGrad)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" transform="translate(62,316) scale(1.5)">
      <circle cx="8" cy="8" r="4"/>
      <line x1="11" y1="11" x2="21" y2="21"/>
      <line x1="15.5" y1="15.5" x2="18.5" y2="12.5"/>
      <line x1="18.5" y1="18.5" x2="21.5" y2="15.5"/>
    </g>
    <text x="142" y="352" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#e6e6f0">Bring Your Own AI</text>
    <text x="64" y="404" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" fill="#9999ad">Works with Ollama (free, local), Claude, or</text>
    <text x="64" y="428" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" fill="#9999ad">OpenAI. Your key, your choice, your data.</text>
  </g>

  <!-- Card 4: Free Trial Built In -->
  <g>
    <rect x="620" y="294" width="540" height="230" rx="14" fill="#1a1a26" stroke="rgba(255,255,255,0.08)"/>
    <circle cx="670" cy="344" r="28" fill="rgba(139,123,255,0.12)" stroke="#8b7bff" stroke-opacity="0.35"/>
    <g fill="none" stroke="url(#iconGrad)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" transform="translate(642,316) scale(1.5)">
      <circle cx="12" cy="9" r="6"/>
      <path d="M9 14l-2 7 5-3 5 3-2-7"/>
    </g>
    <text x="722" y="352" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#e6e6f0">Free Trial Built In</text>
    <text x="644" y="404" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" fill="#9999ad">5 full codebase-aware agent runs every month</text>
    <text x="644" y="428" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" fill="#9999ad">— no credit card required to start.</text>
  </g>
</svg>
